<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3f3f46"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Outer Container Card -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="12"/>
  
  <!-- Subtly styled brackets / terminal prompt element -->
  <path d="M 120 180 L 80 180 L 80 332 L 120 332" fill="none" stroke="#71717a" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 392 180 L 432 180 L 432 332 L 392 332" fill="none" stroke="#71717a" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Central "A" Monogram -->
  <text x="256" y="340" font-family="'Averia Serif Libre', 'Georgia', serif" font-weight="900" font-size="280" fill="#ffffff" text-anchor="middle" filter="url(#glow)">A</text>
  
  <!-- Small accent indicator dot -->
  <circle cx="345" cy="155" r="20" fill="#10b981"/>
</svg>
